<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>
    <main>
        {% if user.is_authenticated %}
            <h2>Welcome, {{ user.username }}!</h2>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">Log Out</button>
            </form>
        {% else %}
            <h2>You are not logged in.</h2>
            <a href="{% url 'login' %}">Click here to Log In</a>
        {% endif %}
    </main>
</body>
</html>
